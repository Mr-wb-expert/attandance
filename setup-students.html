<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Students - Attendance Manager</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a2e; color: white; padding: 40px; text-align: center; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { color: #6366f1; }
        button { background: #6366f1; color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 10px; }
        button:hover { background: #4f46e5; }
        .success { color: #22c55e; margin-top: 20px; }
        .info { color: #a0a0b0; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Add Students to Attendance System</h1>
        <p class="info">Click the button below to add 55 students to your attendance system.</p>
        <button onclick="addStudents()">Add Students</button>
        <div id="result"></div>
    </div>
    <script>
        function addStudents() {
            const students = [
                {rollNo: "100039", name: "Ayesha Jamshed"},
                {rollNo: "100040", name: "Ali Hassan"},
                {rollNo: "100041", name: "Mubeen Tariq"},
                {rollNo: "100042", name: "Ayesha Bibi"},
                {rollNo: "100043", name: "Amna Gull"},
                {rollNo: "100044", name: "Ali Raza"},
                {rollNo: "100045", name: "M-Usman"},
                {rollNo: "100046", name: "Awais Qurni"},
                {rollNo: "100048", name: "Ayesha Saleem"},
                {rollNo: "100049", name: "Iman Zahid"},
                {rollNo: "100050", name: "Adeela Naz"},
                {rollNo: "100051", name: "Nida Imran"},

                {rollNo: "100054", name: "Mouzan Raza"},
                {rollNo: "100055", name: "M-Arslan"},

                {rollNo: "100064", name: "Tooba Rafique"},
                {rollNo: "100067", name: "M.Qasim"},
                {rollNo: "100069", name: "Rubina Bibi"},
                {rollNo: "100070", name: "M. Bilal"},
                {rollNo: "100071", name: "Umair-ul-Hasan"},
                {rollNo: "100072", name: "Qayoom Ali"},
                {rollNo: "100073", name: "Javeria"},
                {rollNo: "100074", name: "Umara"},
                {rollNo: "100075", name: "Rabia"},
                {rollNo: "100076", name: "M. Hussnain"},
                {rollNo: "100078", name: "Asad Qurban"},
                {rollNo: "100079", name: "Behzad"},
                {rollNo: "100081", name: "Nimra Kanwal"},
               
                {rollNo: "100083", name: "Malika"},
                {rollNo: "112649", name: "Ayesha"},
                {rollNo: "112650", name: "Mamoonah"},
                {rollNo: "112651", name: "Subhan"}
            ];

            const existingStudents = JSON.parse(localStorage.getItem('attendance_students') || '[]');
            const existingRollNos = new Set(existingStudents.map(s => s.rollNo));
            
            let added = 0;
            students.forEach(s => {
                if (!existingRollNos.has(s.rollNo)) {
                    existingStudents.push({
                        id: Date.now().toString(36) + Math.random().toString(36).substr(2),
                        rollNo: s.rollNo,
                        name: s.name
                    });
                    added++;
                }
            });

            localStorage.setItem('attendance_students', JSON.stringify(existingStudents));
            
            document.getElementById('result').innerHTML = `
                <p class="success">Added ${added} students!</p>
                <p class="info">Total students now: ${existingStudents.length}</p>
                <button onclick="window.location.href='index.html'">Go to Attendance System</button>
            `;
        }
    </script>
</body>
</html>
